replicaCount: 1

image:
  repository: cubbit/slideshow
  tag: "2.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: slideshow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

terminationGracePeriodSeconds: 60

podDisruptionBudget:
  enabled: false
  minAvailable: 1

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  mountPath: /data
  annotations: {}

# Application configuration
app:
  logLevel: info
  dataDir: /data

# S3 settings (used to seed DB on first run)
s3:
  bucketName: slideshow
  prefix: ""
  endpoint: ""
  region: eu-central-1
  accessKeyId: ""
  secretAccessKey: ""

# Slideshow settings
slideshow:
  speedS: 200
  rows: 3
  minCountForMarquee: 6
  cacheTtlS: 30
  maxFileSize: 10485760
  multipartThreshold: 5242880

# Auth (optional — if not set, a random password is generated)
auth:
  adminPassword: ""
  jwtSecret: ""
  # Use a pre-existing Secret instead of creating one from values
  # The secret must contain keys: s3-endpoint, s3-access-key-id, s3-secret-access-key
  # Optional keys: admin-password, jwt-secret, webhook-secret
  existingSecret: ""

# Webhooks (optional — seeded on first run if no webhooks exist in DB)
# Single webhook shorthand:
webhook:
  url: ""
  secret: ""
  name: ""
# Multiple webhooks (JSON array):
# webhooks: '[{"name":"LED Controller","url":"https://led.example.com/hook","secret":"s3cret"}]'
webhooks: ""

probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
