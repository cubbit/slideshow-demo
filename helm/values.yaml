replicaCount: 1

image:
  repository: cubbit/slideshow
  tag: "2.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: slideshow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  mountPath: /data

# Application configuration
app:
  logLevel: info
  dataDir: /data

# S3 settings (used to seed DB on first run)
s3:
  bucketName: slideshow
  prefix: ""
  endpoint: ""
  region: eu-central-1
  accessKeyId: ""
  secretAccessKey: ""

# Slideshow settings
slideshow:
  speedS: 200
  rows: 3
  minCountForMarquee: 6
  cacheTtlS: 30
  maxFileSize: 10485760
  multipartThreshold: 5242880

# Auth (optional — if not set, a random password is generated)
auth:
  adminPassword: ""
  jwtSecret: ""

# Webhooks (optional — seeded on first run if no webhooks exist in DB)
# Single webhook shorthand:
webhook:
  url: ""
  secret: ""
  name: ""
# Multiple webhooks (JSON array):
# webhooks: '[{"name":"LED Controller","url":"https://led.example.com/hook","secret":"s3cret"}]'
webhooks: ""

probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
