apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cubbit-slideshow.fullname" . }}
  labels:
    {{- include "cubbit-slideshow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cubbit-slideshow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cubbit-slideshow.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: DATA_DIR
              value: {{ .Values.app.dataDir | quote }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.s3.bucketName | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: SLIDESHOW_SPEED_S
              value: {{ .Values.slideshow.speedS | quote }}
            - name: SLIDESHOW_ROWS
              value: {{ .Values.slideshow.rows | quote }}
            - name: MIN_COUNT_FOR_MARQUEE
              value: {{ .Values.slideshow.minCountForMarquee | quote }}
            - name: CACHE_TTL_S
              value: {{ .Values.slideshow.cacheTtlS | quote }}
            - name: MAX_FILE_SIZE
              value: {{ .Values.slideshow.maxFileSize | quote }}
            - name: MULTIPART_THRESHOLD
              value: {{ .Values.slideshow.multipartThreshold | quote }}
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.fullname" . }}
                  key: s3-endpoint
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.fullname" . }}
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.fullname" . }}
                  key: s3-secret-access-key
            {{- if .Values.auth.adminPassword }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.fullname" . }}
                  key: admin-password
            {{- end }}
            {{- if .Values.auth.jwtSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.fullname" . }}
                  key: jwt-secret
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.app.dataDir }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cubbit-slideshow.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
