{{- if and (gt (int .Values.replicaCount) 1) .Values.persistence.enabled }}
{{- fail "replicaCount > 1 is incompatible with ReadWriteOnce persistence. Disable persistence or use replicaCount: 1." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cubbit-slideshow.fullname" . }}
  labels:
    {{- include "cubbit-slideshow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "cubbit-slideshow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cubbit-slideshow.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cubbit-slideshow.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: DATA_DIR
              value: {{ .Values.app.dataDir | quote }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.s3.bucketName | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: SLIDESHOW_SPEED_S
              value: {{ .Values.slideshow.speedS | quote }}
            - name: SLIDESHOW_ROWS
              value: {{ .Values.slideshow.rows | quote }}
            - name: MIN_COUNT_FOR_MARQUEE
              value: {{ .Values.slideshow.minCountForMarquee | quote }}
            - name: CACHE_TTL_S
              value: {{ .Values.slideshow.cacheTtlS | quote }}
            - name: MAX_FILE_SIZE
              value: {{ .Values.slideshow.maxFileSize | quote }}
            - name: MULTIPART_THRESHOLD
              value: {{ .Values.slideshow.multipartThreshold | quote }}
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: s3-endpoint
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: s3-secret-access-key
            {{- if .Values.auth.adminPassword }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: admin-password
            {{- end }}
            {{- if .Values.auth.jwtSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: jwt-secret
            {{- end }}
            {{- if .Values.webhook.url }}
            - name: WEBHOOK_URL
              value: {{ .Values.webhook.url | quote }}
            - name: WEBHOOK_NAME
              value: {{ .Values.webhook.name | quote }}
            {{- if .Values.webhook.secret }}
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: webhook-secret
            {{- end }}
            {{- end }}
            {{- if .Values.webhooks }}
            - name: WEBHOOKS
              valueFrom:
                secretKeyRef:
                  name: {{ include "cubbit-slideshow.secretName" . }}
                  key: webhooks
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.app.dataDir }}
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cubbit-slideshow.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
